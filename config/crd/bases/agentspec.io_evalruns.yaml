---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: evalruns.agentspec.io
spec:
  group: agentspec.io
  names:
    kind: EvalRun
    listKind: EvalRunList
    plural: evalruns
    singular: evalrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agentRef
      name: AGENT
      type: string
    - jsonPath: .status.phase
      name: PHASE
      type: string
    - jsonPath: .status.summary.score
      name: SCORE
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          EvalRun is the Schema for the evalruns API.
          It represents a single evaluation run of an agent against a set of test cases.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EvalRunSpec defines the desired state of an EvalRun.
            properties:
              agentRef:
                description: AgentRef is the name of the Agent resource to evaluate.
                type: string
              parallelism:
                default: 1
                description: Parallelism is the number of test cases to run concurrently.
                format: int32
                type: integer
              testCases:
                description: TestCases is the list of test cases to execute.
                items:
                  description: EvalTestCase defines a single test case for agent evaluation.
                  properties:
                    expectedOutput:
                      description: ExpectedOutput is the expected agent response to
                        compare against.
                      type: string
                    input:
                      description: Input is the prompt or message sent to the agent.
                      type: string
                    matchType:
                      default: contains
                      description: MatchType determines how ActualOutput is compared
                        to ExpectedOutput.
                      enum:
                      - exact
                      - contains
                      - regex
                      type: string
                    name:
                      description: Name is the unique name of this test case.
                      type: string
                    timeout:
                      default: 30s
                      description: Timeout is the maximum duration to wait for the
                        agent response.
                      type: string
                  required:
                  - input
                  - name
                  type: object
                minItems: 1
                type: array
            required:
            - agentRef
            - testCases
            type: object
          status:
            description: EvalRunStatus defines the observed state of an EvalRun.
            properties:
              completionTime:
                description: CompletionTime is the timestamp when the evaluation run
                  completed.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the EvalRun's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the current phase of the evaluation run.
                type: string
              results:
                description: Results contains the outcome of each test case.
                items:
                  description: EvalResult captures the outcome of a single test case
                    execution.
                  properties:
                    actualOutput:
                      description: ActualOutput is the agent's actual response.
                      type: string
                    latencyMs:
                      description: LatencyMs is the response latency in milliseconds.
                      format: int64
                      type: integer
                    name:
                      description: Name is the name of the test case this result corresponds
                        to.
                      type: string
                    passed:
                      description: Passed indicates whether the test case passed.
                      type: boolean
                    tokenUsage:
                      description: TokenUsage tracks the token consumption for this
                        test case.
                      properties:
                        completionTokens:
                          description: CompletionTokens is the number of tokens in
                            the completion.
                          format: int64
                          type: integer
                        promptTokens:
                          description: PromptTokens is the number of tokens in the
                            prompt.
                          format: int64
                          type: integer
                        totalTokens:
                          description: TotalTokens is the sum of prompt and completion
                            tokens.
                          format: int64
                          type: integer
                      type: object
                  type: object
                type: array
              startTime:
                description: StartTime is the timestamp when the evaluation run started.
                format: date-time
                type: string
              summary:
                description: Summary provides aggregate statistics for the evaluation
                  run.
                properties:
                  failed:
                    description: Failed is the number of test cases that failed.
                    format: int32
                    type: integer
                  passed:
                    description: Passed is the number of test cases that passed.
                    format: int32
                    type: integer
                  score:
                    description: Score is the pass rate as a human-readable string
                      (e.g. "80%").
                    type: string
                  total:
                    description: Total is the total number of test cases executed.
                    format: int32
                    type: integer
                  totalTokens:
                    description: TotalTokens is the aggregate token usage across all
                      test cases.
                    format: int64
                    type: integer
                required:
                - failed
                - passed
                - total
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
