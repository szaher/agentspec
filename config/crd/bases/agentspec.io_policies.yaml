---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: policies.agentspec.io
spec:
  group: agentspec.io
  names:
    kind: Policy
    listKind: PolicyList
    plural: policies
    singular: policy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.name
      name: NAME
      type: string
    - jsonPath: .status.affectedAgentCount
      name: AFFECTED-AGENTS
      type: integer
    - jsonPath: .status.violationCount
      name: VIOLATIONS
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Policy is the Schema for the policies API. It is namespace-scoped.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PolicySpec defines the desired state of a Policy.
            properties:
              allowedModels:
                description: AllowedModels is a list of model identifiers that are
                  allowed.
                items:
                  type: string
                type: array
              contentFilters:
                description: ContentFilters is a list of content filtering rules.
                items:
                  description: ContentFilter defines a content filtering rule.
                  properties:
                    pattern:
                      description: Pattern is the regex or matching pattern for the
                        filter.
                      type: string
                    type:
                      description: Type specifies whether the filter applies to input,
                        output, or both.
                      enum:
                      - input
                      - output
                      - both
                      type: string
                  required:
                  - pattern
                  - type
                  type: object
                type: array
              costBudget:
                description: CostBudget defines cost budget constraints.
                properties:
                  currency:
                    default: USD
                    description: Currency is the currency code for the cost budget.
                    type: string
                  maxDailyCost:
                    description: MaxDailyCost is the maximum allowed daily cost (e.g.
                      "10.00").
                    type: string
                required:
                - maxDailyCost
                type: object
              deniedModels:
                description: DeniedModels is a list of model identifiers that are
                  denied.
                items:
                  type: string
                type: array
              rateLimits:
                description: RateLimits defines rate limiting constraints.
                properties:
                  requestsPerMinute:
                    description: RequestsPerMinute is the maximum number of requests
                      per minute.
                    format: int32
                    type: integer
                  tokensPerMinute:
                    description: TokensPerMinute is the maximum number of tokens per
                      minute.
                    format: int64
                    type: integer
                type: object
              targetSelector:
                description: TargetSelector selects the agents this policy applies
                  to.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              toolRestrictions:
                description: ToolRestrictions defines which tools are allowed or denied.
                properties:
                  allowedTools:
                    description: AllowedTools is a list of tool names that are explicitly
                      allowed.
                    items:
                      type: string
                    type: array
                  deniedTools:
                    description: DeniedTools is a list of tool names that are explicitly
                      denied.
                    items:
                      type: string
                    type: array
                type: object
            type: object
          status:
            description: PolicyStatus defines the observed state of a Policy.
            properties:
              affectedAgentCount:
                description: AffectedAgentCount is the number of agents affected by
                  this policy.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest available observations
                  of the policy's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              violationCount:
                description: ViolationCount is the total number of policy violations
                  observed.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
