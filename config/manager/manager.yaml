apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentspec-operator
  namespace: agentspec-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentspec-operator
  namespace: agentspec-system
  labels:
    app.kubernetes.io/name: agentspec-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentspec-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentspec-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: agentspec-operator
      containers:
        - name: manager
          image: agentspec-operator:latest
          imagePullPolicy: Never
          command:
            - /agentspec
            - operator
            - start
            - --leader-elect=false
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 10
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentspec-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentspec-operator-role
subjects:
  - kind: ServiceAccount
    name: agentspec-operator
    namespace: agentspec-system
