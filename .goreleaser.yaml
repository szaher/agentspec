version: 2

project_name: agentspec

builds:
  - id: agentspec
    main: ./cmd/agentspec
    binary: agentspec
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: szaher
    name: agentspec
  draft: false
  prerelease: auto

brews:
  - name: agentspec
    repository:
      owner: szaher
      name: homebrew-agentspec
    homepage: "https://github.com/szaher/agentspec"
    description: "Declarative language for defining and deploying AI agents"
    license: "Apache-2.0"
    test: |
      system "#{bin}/agentspec", "version"
    install: |
      bin.install "agentspec"

dockers:
  - id: agentspec-amd64
    goos: linux
    goarch: amd64
    ids:
      - agentspec
    image_templates:
      - "ghcr.io/szaher/agentspec:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: agentspec-arm64
    goos: linux
    goarch: arm64
    ids:
      - agentspec
    image_templates:
      - "ghcr.io/szaher/agentspec:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/szaher/agentspec:{{ .Version }}"
    image_templates:
      - "ghcr.io/szaher/agentspec:{{ .Version }}-amd64"
      - "ghcr.io/szaher/agentspec:{{ .Version }}-arm64"

  - name_template: "ghcr.io/szaher/agentspec:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/szaher/agentspec:{{ .Version }}-amd64"
      - "ghcr.io/szaher/agentspec:{{ .Version }}-arm64"

  - name_template: "ghcr.io/szaher/agentspec:{{ .Major }}"
    image_templates:
      - "ghcr.io/szaher/agentspec:{{ .Version }}-amd64"
      - "ghcr.io/szaher/agentspec:{{ .Version }}-arm64"

  - name_template: "ghcr.io/szaher/agentspec:latest"
    image_templates:
      - "ghcr.io/szaher/agentspec:{{ .Version }}-amd64"
      - "ghcr.io/szaher/agentspec:{{ .Version }}-arm64"
